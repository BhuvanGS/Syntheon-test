<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meet – byt-bbhy-uwz Calculator</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="calculator">
        <!-- Header with toggles -->
        <div class="toolbar">
            <button id="theme-toggle" class="toggle-btn">🌙</button>
            <button id="scientific-toggle" class="toggle-btn">🔬</button>
        </div>
        <!-- Two‑line display -->
        <div id="display" class="display">
            <div id="prev" class="prev"></div>
            <div id="current" class="current">0</div>
        </div>
        <!-- Main button grid -->
        <div class="buttons">
            <button class="btn" data-action="clear">C</button>
            <button class="btn" data-action="delete">⌫</button>
            <button class="btn" data-action="divide">÷</button>
            <button class="btn" data-action="multiply">×</button>

            <button class="btn" data-number="7">7</button>
            <button class="btn" data-number="8">8</button>
            <button class="btn" data-number="9">9</button>
            <button class="btn" data-action="subtract">−</button>

            <button class="btn" data-number="4">4</button>
            <button class="btn" data-number="5">5</button>
            <button class="btn" data-number="6">6</button>
            <button class="btn" data-action="add">+</button>

            <button class="btn" data-number="1">1</button>
            <button class="btn" data-number="2">2</button>
            <button class="btn" data-number="3">3</button>
            <button class="btn" data-action="equals" class="equals">=</button>

            <button class="btn zero" data-number="0">0</button>
            <button class="btn" data-number=".">.</button>
            <button class="btn" data-action="percentage">%</button>
        </div>
        <!-- Scientific buttons (hidden by default) -->
        <div class="scientific-buttons hidden">
            <button class="btn" data-action="sin">sin</button>
            <button class="btn" data-action="cos">cos</button>
            <button class="btn" data-action="tan">tan</button>
            <button class="btn" data-action="log">log</button>
            <button class="btn" data-action="sqrt">√</button>
            <button class="btn" data-action="power">^</button>
        </div>
        <!-- History panel -->
        <div class="history-panel">
            <h3>History</h3>
            <button id="clear-history" class="clear-history-btn">Clear</button>
            <ul id="history-list"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
